server:
  tomcat:
    basedir: /home/logs/tms-admin/tomcat-logs
    accesslog:
      enabled: true
      pattern: '%t %{X-Forwarded-For}i %a "%r" %s %D (%D ms)'
spring:
  datasource:
    url: jdbc:p6spy:mysql://127.0.0.1:3306/tms_sit?autoReconnect=true&useServerPreparedStmts=false&rewriteBatchedStatements=true&characterEncoding=UTF-8&useSSL=false&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: xxxxxx
    initial-size: 2
    min-idle: 10
    max-active: 50
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    filters: stat
    druid:
      username: druid
      password: xxxxxx
      login:
        enabled: false
      method:
        pointcut: net.lab1024.tms..*Service.*
  redis:
    database: 1
    host: 127.0.0.1
    lettuce:
      pool:
        max-active: 5
        min-idle: 1
        max-idle: 3
        max-wait: 30000ms
    port: 6666
    timeout: 10000ms
    password: xxxxxx
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-enums-using-to-string: true
      write-dates-as-timestamps: false
    deserialization:
      read-enums-using-to-string: true
      fail-on-unknown-properties: false
    default-property-inclusion: always
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  cache:
    type: caffeine
file:
  storage:
    mode: cloud
    local:
      path: /home/upload/
    cloud:
      region: oss-cn-zhangjiakou
      endpoint: oss-cn-zhangjiakou.aliyuncs.com
      bucket-name: tms-sit
      access-key: xxxxxxx
      secret-key: xxxxxxx
      url:
        expire: 7200000
        public: https://${file.storage.cloud.bucket-name}.${file.storage.cloud.endpoint}/
swagger:
  api-group-name: smart-admin
  title: SmartAdmin
  description: SmartAdmin2.0
  version: 2.0
  host: sit-tms.1024lab.net/api/
  package: net.lab1024.tms
  tag-class: net.lab1024.tms.common.constant.SwaggerTagConst
  team-url: https://www.1024lab.net/
http:
  pool:
    max-total: 20
    connect-timeout: 50000
    read-timeout: 50000
    write-timeout: 50000
    keep-alive: 300000
token:
  key: smart-admin-jwt-key
  expire-day: 7
access-control-allow-origin: '*'
heart-beat:
  interval-seconds: 30
reload:
  interval-seconds: 30
# 合同模板 生成文件的临时路径
contact:
  template:
    file-path: /home/file/contact-template/temp-file/